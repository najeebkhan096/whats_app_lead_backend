version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: whats_lead_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-whats_lead}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-whats_lead_secure_password}
      POSTGRES_DB: ${DB_NAME:-whats_lead}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-whats_lead}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whats_lead_network_prod

  # Redis
  redis:
    image: redis:7-alpine
    container_name: whats_lead_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data_prod:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whats_lead_network_prod

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whats_lead_backend_prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-whats_lead}:${DB_PASSWORD:-whats_lead_secure_password}@postgres:5432/${DB_NAME:-whats_lead}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - whats_lead_network_prod

  # Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whats_lead_worker_prod
    restart: always
    command: node dist/workers/index.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-whats_lead}:${DB_PASSWORD:-whats_lead_secure_password}@postgres:5432/${DB_NAME:-whats_lead}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - whats_lead_network_prod

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  whats_lead_network_prod:
    driver: bridge
